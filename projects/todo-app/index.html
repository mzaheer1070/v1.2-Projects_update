<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App | Muhammad Zaheer</title>
    <link rel="stylesheet" href="../shared/project-site.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="portfolio-bridge">
    <div class="portfolio-bridge-inner">
        <a class="bridge-brand" data-root-href="index.html">Muhammad Zaheer</a>
        <nav class="bridge-nav" aria-label="Portfolio navigation">
            <a data-root-href="index.html">Home</a>
            <a data-root-href="projects.html">Projects</a>
            <a data-root-href="about.html">About</a>
            <a data-root-href="contact.html">Contact</a>
        </nav>
        <p class="bridge-badge">Live project · Todo App</p>
    </div>
</header>

<header class="site-bar">
    <a class="back-link" data-root-href="projects.html">← All projects</a>
    <a class="back-link" data-root-href="index.html">Portfolio home</a>
</header>

<main class="app-wrap">
    <h1>Todo App</h1>
    <p>Add tasks, mark them done, and filter your list. Saved in your browser.</p>

    <section class="card todo-card">
        <form class="todo-form" id="todo-form">
            <label class="sr-only" for="todo-input">New task</label>
            <input id="todo-input" type="text" placeholder="What do you need to do?" maxlength="120" required>
            <button type="submit">Add</button>
        </form>

        <div class="filter-row" role="group" aria-label="Filter tasks">
            <button type="button" class="filter-btn is-active" data-filter="all">All</button>
            <button type="button" class="filter-btn" data-filter="active">Active</button>
            <button type="button" class="filter-btn" data-filter="done">Done</button>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
        <p class="empty-msg" id="empty-msg" hidden>No tasks yet — add one above.</p>
    </section>
</main>

<script src="../../js/portfolio-links.js"></script>
<script src="js/app.js"></script>
</body>
</html>
